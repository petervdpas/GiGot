name: Release GiGot

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure git identity (integration tests)
        # GiGot's scaffold code pushes to the "master" branch by default, and
        # InitBare relies on git's HEAD default. Do NOT set init.defaultBranch
        # here — forcing "main" leaves the bare HEAD pointing at an empty
        # branch while scaffold commits land on "master", and every /head
        # request comes back 409 ErrRepoEmpty.
        run: |
          git config --global user.email "ci@gigot.local"
          git config --global user.name  "GiGot CI"

      - name: Unit + integration tests
        run: go test ./... -v

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [test]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: ""
          - goos: windows
            goarch: amd64
            runner: ubuntu-24.04
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Extract version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0-dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-s -w -X main.appVersion=${VERSION}"
          go build -trimpath -ldflags "${LDFLAGS}" -o gigot${{ matrix.ext }} .

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NAME="gigot-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${NAME}"

          cp gigot${{ matrix.ext }} "${NAME}/"
          cp README.md "${NAME}/"
          cp LICENSE "${NAME}/" 2>/dev/null || true

          mkdir -p dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd "${NAME}" && zip -r "../dist/${NAME}.zip" .)
          else
            tar czf "dist/${NAME}.tar.gz" "${NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-image:
    name: Publish Docker image
    needs: [test]
    # Image publishing only happens for tagged releases — manual
    # workflow_dispatch runs build the binaries but skip the registry
    # push so we don't accidentally overwrite :latest from a branch.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: petervdpas/gigot
          # `type=semver,pattern={{version}}` strips the leading `v` so
          # consumers get `petervdpas/gigot:0.4.0` (the Docker Hub
          # convention), and `:latest` always points at the most recent
          # tagged release.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # Bake provenance + SBOM into the manifest so Docker Scout's
          # supply-chain check goes green on the published image.
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

  release:
    name: Publish GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp -v {} dist/ \;
          ls -la dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "GiGot ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
