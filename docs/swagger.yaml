        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Enroll a client's public key
      tags:
      - clients
  /crypto/pubkey:
    get:
      description: |-
        Returns the base64-encoded curve25519 public key that clients
        use to seal request bodies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ServerPubKeyResponse'
      summary: Fetch the server's NaCl public key
      tags:
      - crypto
  /git/{name}.git/git-receive-pack:
    post:
      consumes:
      - application/octet-stream
      description: Git smart HTTP protocol — receives packfile data for push operations
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Git push
      tags:
      - git
  /git/{name}.git/git-upload-pack:
    post:
      consumes:
      - application/octet-stream
      description: Git smart HTTP protocol — serves packfile data for clone and fetch
        operations
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Git clone/fetch
      tags:
      - git
  /git/{name}.git/info/refs:
    get:
      description: Git smart HTTP protocol — advertise refs for clone/fetch/push
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: git-upload-pack or git-receive-pack
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Git refs discovery
      tags:
      - git
  /health:
    get:
      description: Returns server health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.HealthResponse'
      summary: Health check
      tags:
      - system
  /repos:
    get:
      consumes:
      - application/json
      description: |-
        GET lists all repositories, POST creates a new one. Set
        scaffold_formidable: true to seed the fresh repo with a
        starter Formidable context (README, templates/basic.yaml,
        storage/.gitkeep, and the .formidable/context.json marker)
        in an initial commit.
      parameters:
      - description: Create-repo body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.CreateRepoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoListResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List or create repositories
      tags:
      - repos
    post:
      consumes:
      - application/json
      description: |-
        GET lists all repositories, POST creates a new one. Set
        scaffold_formidable: true to seed the fresh repo with a
        starter Formidable context (README, templates/basic.yaml,
        storage/.gitkeep, and the .formidable/context.json marker)
        in an initial commit.
      parameters:
      - description: Create-repo body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.CreateRepoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoListResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List or create repositories
      tags:
      - repos
  /repos/{name}:
    delete:
      description: GET returns repository details, DELETE removes it
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoInfo'
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get or delete a repository
      tags:
      - repos
    get:
      description: GET returns repository details, DELETE removes it
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoInfo'
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get or delete a repository
      tags:
      - repos
  /repos/{name}/branches:
    get:
      description: Returns all branches in a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/git.BranchInfo'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List branches
      tags:
      - sync
  /repos/{name}/changes:
    get:
      description: |-
        Returns the set of paths added, modified, or deleted between
        the given since version and current HEAD. since must be a
        strict ancestor of HEAD (or equal to it); anything else
        returns 409 so the client can re-snapshot instead of
        consuming a misleading diff. since == HEAD returns an empty
        changes list.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Client's last-seen commit SHA
        in: query
        name: since
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.ChangesInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delta since version
      tags:
      - sync
  /repos/{name}/commits:
    post:
      consumes:
      - application/json
      description: |-
        Applies an ordered list of put/delete changes against the
        given parent_version as a single commit. Returns 200 with
        the new version on success (fast-forward or auto-merged).
        Returns 409 with conflicts[] if any path conflicts — the
        whole commit is rejected, no partial apply.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Commit request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.CommitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.CommitResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: One or more Formidable records violated immutable meta fields
          schema:
            $ref: '#/definitions/server.CommitRecordConflictResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Multi-file atomic commit
      tags:
      - sync
  /repos/{name}/files/{path}:
    get:
      description: |-
        Returns one file's content at the given version (default HEAD),
        base64-encoded. 404 covers both missing repo and path not in
        version; 422 covers an unresolvable version.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: File path inside the repo
        in: path
        name: path
        required: true
        type: string
      - description: Commit SHA (defaults to HEAD)
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.FileInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Single-file read
      tags:
      - sync
    put:
      consumes:
      - application/json
      description: |-
        Commits one file against the given parent_version. Returns
        200 with the new version for a fast-forward or auto-merged
        commit (merged_from/merged_with populated on auto-merge).
        Returns 409 with base/theirs/yours blobs on a real conflict,
        or 409 with only current_version + yours when parent_version
        is not an ancestor of HEAD.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: File path inside the repo
        in: path
        name: path
        required: true
        type: string
      - description: Write request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.WriteFileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.WriteResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Structured record merge conflict (immutable meta field)
          schema:
            $ref: '#/definitions/formidable.RecordConflict'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Single-file write
      tags:
      - sync
  /repos/{name}/head:
    get:
      description: |-
        Returns the current commit SHA and default branch name. Clients
        use this as a cheap probe before pulling tree or snapshot. Returns
        409 if the repo exists but has no commits yet.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.HeadInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository HEAD pointer
      tags:
      - sync
  /repos/{name}/log:
    get:
      description: Returns recent commits from a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - default: 20
        description: Max number of commits
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoLogResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Commit log
      tags:
      - sync
  /repos/{name}/records/{template}:
    get:
      description: |-
        Lists all Formidable records under storage/{template}/ at
        HEAD. Optional where/sort/limit query params apply the
        minimal filter DSL from §10.8 — equality/inequality on
        scalar data.<key> values and numeric range comparisons.
        Sort accepts a data key, optionally prefixed with "-"
        for descending. Limit defaults to no limit.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Template directory name under storage/
        in: path
        name: template
        required: true
        type: string
      - description: Filter expression (e.g. city=London, count>5)
        in: query
        name: where
        type: string
      - description: Data key to sort by (prefix with - for descending)
        in: query
        name: sort
        type: string
      - description: Maximum number of records
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RecordQueryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Record query endpoint (Formidable-first)
      tags:
      - sync
  /repos/{name}/snapshot:
    get:
      description: |-
        Returns every blob at the given version with content
        base64-encoded. Intended for initial client populate and
        disaster recovery; prefer /tree + /files/{path} for
        incremental syncing.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Commit SHA (defaults to HEAD)
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.SnapshotInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository snapshot
      tags:
      - sync
  /repos/{name}/status:
    get:
      description: Returns branches and status of a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoStatusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository status
      tags:
      - sync
  /repos/{name}/tree:
    get:
      description: |-
        Returns the recursive blob listing at the given version (or
        HEAD when omitted). Clients diff this against their local
        snapshot before pulling content. Returns 409 if the repo has
        no commits yet, 422 if version does not resolve.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Commit SHA (defaults to HEAD)
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.TreeInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository tree listing
      tags:
      - sync
securityDefinitions:
  BearerAuth:
    description: 'Enter your bearer token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
