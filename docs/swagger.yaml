host: localhost:3417
info:
  contact:
    name: Peter van de Pas
  description: HTTP Basic with the subscription token as the password. The username
    is ignored — tokens are self-identifying. This is the form `git clone http://user:<token>@host/git/repo`
    produces, so git-over-HTTP works out of the box.
  license:
    name: MIT
  title: GiGot API
  version: 0.1.0
paths:
  /admin/accounts:
    get:
      consumes:
      - application/json
      description: |-
        GET lists every known account (admins and regulars);
        POST creates one. Session-cookie authenticated. See
        docs/design/accounts.md for the data model.
      parameters:
      - description: Create body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: GET response
          schema:
            $ref: '#/definitions/server.AccountListResponse'
        "201":
          description: POST response
          schema:
            $ref: '#/definitions/server.AccountView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Account already exists
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage accounts (admin only)
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: |-
        GET lists every known account (admins and regulars);
        POST creates one. Session-cookie authenticated. See
        docs/design/accounts.md for the data model.
      parameters:
      - description: Create body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: GET response
          schema:
            $ref: '#/definitions/server.AccountListResponse'
        "201":
          description: POST response
          schema:
            $ref: '#/definitions/server.AccountView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Account already exists
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage accounts (admin only)
      tags:
      - admin
  /admin/accounts/{provider}/{identifier}:
    delete:
      consumes:
      - application/json
      description: |-
        PATCH updates role, display_name, and/or password
        (local only). DELETE removes the account; the server
        refuses to remove the last admin so the console can't
        lock itself out. Session-cookie authenticated.
      parameters:
      - description: Account provider
        in: path
        name: provider
        required: true
        type: string
      - description: Account identifier
        in: path
        name: identifier
        required: true
        type: string
      - description: Patch body (PATCH)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.AccountView'
        "204":
          description: DELETE response
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Would remove the last admin
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage one account by (provider, identifier) (admin only)
      tags:
      - admin
    patch:
      consumes:
