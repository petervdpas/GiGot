  /admin/subscriptions/revoke-by-tag:
    post:
      consumes:
      - application/json
      description: |-
        Revokes every subscription whose effective tag set
        (sub.tags ∪ repo.tags ∪ account.tags) carries at least
        one of the tags in the request body. Multiple tag
        values union (OR — same inclusion semantics as the
        chip UI; selecting more chips widens the match).
        Empty tag list is a 400 — bulk-revoke without a
        filter would clear the catalogue, which has enough
        blast radius to deserve a different endpoint.

        The Confirm field must match the deterministic phrase
        `revoke <comma-joined-lower-tags>` (tags sorted, e.g.
        `revoke contractor:acme,team:marketing`). This is
        anti-typo friction — same purpose as a `--force` flag
        on a destructive command — not an anti-script gate
        (the phrase is deterministic from the request inputs,
        so any caller that can compute the tag list can compute
        the phrase). Server-side validation runs alongside the
        UI check so a buggy callsite can't omit the field by
        accident. The auth boundary is the admin session,
        same as every other `/api/admin/*` endpoint.

        Each revoked subscription emits a `tag.revoked.bulk`
        event on its repo's refs/audit/main with the matching
        tag set, so the audit chain answers "why was sub-77
        revoked?" six months later. Session-cookie auth.
