        internal/server/templates/fragments/. Used by the
        GG.lazy client helper to render detail panes on
        demand. Admin-session gated — fragments don't carry
        user data but they encode admin-UI shape (which
        inputs exist, what gets PATCHed where), and a
        leak gives an attacker recon for free.

