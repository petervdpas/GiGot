        Requires a valid admin session cookie (obtained via /admin/login).

        Issue and PATCH paths reject ability grants the issued
        account's role is not entitled to hold (today: `mirror`
        requires admin or maintainer role; granting it to a
        regular returns 400). See accounts.md §6.1.

        GET supports a repeating `?tag=` query parameter that filters
        by effective tags (sub.tags ∪ repo.tags ∪ account.tags). Multiple
        values union (OR — chips are inclusion filters; selecting
        more chips widens the match). Tag matching is case-insensitive.

        PATCH bodies that include a `tags` field receive an
        UpdateTokenResponse echoing the canonical post-update
        `tags` (direct) and `effective_tags` (the §2 union),
        so the admin UI can patch its in-memory model without
        a follow-up listing fetch. Repo / abilities-only
        PATCH bodies still receive the simpler MessageResponse.
