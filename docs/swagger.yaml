          description: Missing session cookie / bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber: token not in scope for this repo'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - SessionAuth: []
      - BearerAuth: []
      summary: List mirror-sync destinations on a repo
      tags:
      - admin
      - repos
    post:
      consumes:
      - application/json
      description: |-
        Attaches a new destination pointing at a named credential
        in the vault (see credential-vault.md §5,
        remote-sync.md §3.1). Returns 201 with the stored
        destination on success. Subscriber callers must hold
        admin/maintainer role AND the `mirror` ability — see
        accounts.md §6.1; admin-session callers bypass.
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      - description: Destination payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.CreateDestinationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.DestinationView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Missing session cookie / bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber: missing mirror ability or role, or out of scope'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo or credential_name not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - SessionAuth: []
      - BearerAuth: []
      summary: Add a mirror-sync destination to a repo
      tags:
      - admin
      - repos
  /repos/{name}/destinations/{id}:
    delete:
      description: |-
        Removes the destination from the repo; the auto-mirror
        fan-out stops firing for it on subsequent commits.
        Returns 204 with no body. Subscriber callers need
        admin/maintainer role + `mirror` ability; admin-session
        callers bypass.
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      - description: Destination id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Destination removed
        "401":
          description: Missing session cookie / bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber: missing mirror ability or role, or out of scope'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo or destination not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - SessionAuth: []
      - BearerAuth: []
      summary: Remove one mirror-sync destination
      tags:
      - admin
      - repos
    get:
      description: |-
        Returns the destination's stored configuration plus its
        most recent sync attempt (status / timestamp / error).
        Read-only; per-bearer mirror ability NOT required —
        the read/write split lets any in-scope subscriber
        inspect the configuration without managing it.
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      - description: Destination id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.DestinationView'
        "401":
          description: Missing session cookie / bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber: token not in scope for this repo'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo or destination not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - SessionAuth: []
      - BearerAuth: []
      summary: Read one mirror-sync destination by id
      tags:
      - admin
      - repos
    patch:
      consumes:
      - application/json
      description: |-
        Updates any of `url`, `credential_name`, `enabled`.
        Omitted fields are left unchanged (nil-pointer ==
        "no change"). Empty-string url or credential_name is
        rejected — delete the destination instead. Subscriber
        callers need admin/maintainer role + `mirror` ability;
        admin-session callers bypass.
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      - description: Destination id
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.UpdateDestinationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.DestinationView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Missing session cookie / bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber: missing mirror ability or role, or out of scope'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo, destination, or credential_name not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - SessionAuth: []
      - BearerAuth: []
      summary: Patch one mirror-sync destination
      tags:
      - admin
      - repos
  /repos/{name}/destinations/{id}/sync:
    post:
      description: |-
        Invokes `git push +refs/heads/*:refs/heads/* +refs/audit/*:refs/audit/*`
        against the destination's URL, using the vault credential
        referenced by `credential_name`. Runs synchronously — the
        response is the updated destination with `last_sync_at`,
        `last_sync_status`, and (on failure) `last_sync_error`
        populated. On success the vault credential's `last_used`
        timestamp is also touched. Destinations with enabled=false
        still accept this call (manual is explicit operator intent);
        the flag gates only the automatic post-receive fan-out.

        Authorization mirrors the rest of /destinations*: admin
        route requires an admin session; subscriber route requires
        bearer token + repo scope + admin/maintainer role +
        `mirror` ability (see accounts.md §6.1, remote-sync.md
        §2.6 and §5).
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      - description: Destination id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.DestinationView'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber route: missing mirror ability, regular role, or
            repo out of scope'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo, destination, or credential (deleted) not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Credential referenced by destination no longer exists in the
            vault
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - SessionAuth: []
      - BearerAuth: []
      summary: Trigger a manual mirror-sync push on one destination
      tags:
      - admin
      - repos
  /repos/{name}/files/{path}:
    get:
      description: |-
        Returns one file's content at the given version (default HEAD),
        base64-encoded. 404 covers both missing repo and path not in
        version; 422 covers an unresolvable version.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: File path inside the repo
        in: path
        name: path
        required: true
        type: string
      - description: Commit SHA (defaults to HEAD)
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.FileInfo'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Single-file read
      tags:
      - sync
    put:
      consumes:
      - application/json
      description: |-
        Commits one file against the given parent_version. Returns
        200 with the new version for a fast-forward or auto-merged
        commit (merged_from/merged_with populated on auto-merge).
        Returns 409 with base/theirs/yours blobs on a real conflict,
        or 409 with only current_version + yours when parent_version
        is not an ancestor of HEAD. On success, appends one
        `file_put` entry to refs/audit/main — see
        docs/design/audit-trail.md.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: File path inside the repo
        in: path
        name: path
        required: true
        type: string
      - description: Write request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.WriteFileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.WriteResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Structured record merge conflict (immutable meta field)
          schema:
            $ref: '#/definitions/formidable.RecordConflict'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Single-file write
      tags:
      - sync
  /repos/{name}/formidable:
    get:
      description: |-
        One-call read of the Formidable-specific shape of a
        repo: scaffold marker (version/by/at), templates list
        under templates/, and storage layout under storage/.
        Non-Formidable repos return 200 with marker_present
        false and empty arrays so clients can distinguish
        "not Formidable" from "doesn't exist" or "no access."
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoFormidableResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Formidable-shape bootstrap for a repo
      tags:
      - formidable
  /repos/{name}/formidable/records/{template}:
    get:
      description: |-
        Lists all Formidable records under storage/{template}/ at
        HEAD. Optional where/sort/limit query params apply the
        minimal filter DSL from §10.8 — equality/inequality on
        scalar data.<key> values and numeric range comparisons.
        Sort accepts a data key, optionally prefixed with "-"
        for descending. Limit defaults to no limit.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Template directory name under storage/
        in: path
        name: template
        required: true
        type: string
      - description: Filter expression (e.g. city=London, count>5)
        in: query
        name: where
        type: string
      - description: Data key to sort by (prefix with - for descending)
        in: query
        name: sort
        type: string
      - description: Maximum number of records
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RecordQueryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Record query endpoint (Formidable-first)
      tags:
      - formidable
  /repos/{name}/head:
    get:
      description: |-
        Returns the current commit SHA and default branch name. Clients
        use this as a cheap probe before pulling tree or snapshot. Returns
        409 if the repo exists but has no commits yet.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.HeadInfo'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository HEAD pointer
      tags:
      - sync
  /repos/{name}/log:
    get:
      description: Returns recent commits from a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - default: 20
        description: Max number of commits
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoLogResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Commit log
      tags:
      - sync
  /repos/{name}/snapshot:
    get:
      description: |-
        Returns every blob at the given version with content
        base64-encoded. Intended for initial client populate and
        disaster recovery; prefer /tree + /files/{path} for
        incremental syncing.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Commit SHA (defaults to HEAD)
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.SnapshotInfo'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository snapshot
      tags:
      - sync
  /repos/{name}/status:
    get:
      description: Returns branches and status of a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoStatusResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository status
      tags:
      - sync
  /repos/{name}/tree:
    get:
      description: |-
        Returns the recursive blob listing at the given version (or
        HEAD when omitted). Clients diff this against their local
        snapshot before pulling content. Returns 409 if the repo has
        no commits yet, 422 if version does not resolve.
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: Commit SHA (defaults to HEAD)
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/git.TreeInfo'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository tree listing
      tags:
      - sync
securityDefinitions:
  BasicAuth:
    type: basic
  BearerAuth:
    description: 'Enter your bearer token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
  SessionAuth:
    description: Session cookie minted by POST /api/admin/login (or any successful
      OAuth callback). Required by every /api/admin/* endpoint and the /fragments/*
      template server. Browsers attach it automatically; programmatic callers must
      include the cookie header on every request.
    in: cookie
    name: gigot_session
    type: apiKey
swagger: "2.0"
