        durations across the last 60 seconds, and the count
        of samples that were in the rolling window when the
        snapshot was taken.

        Same Level value is reflected on every response via
        the `X-GiGot-Load` header — clients that want the
        gauge as a side-effect of normal traffic should read
        the header rather than poll this endpoint. Polling
        is for explicit health probes and dashboards.

