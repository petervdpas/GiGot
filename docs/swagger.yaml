        entries. Returns only the human-readable name and kind
        per row — no secrets, no expiry, no last-used timestamps.
        The intended caller is a subscriber-side UI wiring a
        mirror destination (Formidable's mirror form), where
        the operator needs to know which vault names exist
        without seeing the secrets the admin holds.

