  /admin/repos/{name}/destinations/{id}/sync:
    post:
      description: |-
        Invokes `git push +refs/heads/*:refs/heads/* +refs/audit/*:refs/audit/*`
        against the destination's URL, using the vault credential
        referenced by `credential_name`. Runs synchronously — the
        response is the updated destination with `last_sync_at`,
        `last_sync_status`, and (on failure) `last_sync_error`
        populated. On success the vault credential's `last_used`
        timestamp is also touched. Destinations with enabled=false
        still accept this call (manual is explicit operator intent);
        the flag gates only the automatic post-receive fan-out.

        Authorization mirrors the rest of /destinations*: admin
        route requires an admin session; subscriber route requires
        bearer token + repo scope + admin/maintainer role +
        `mirror` ability (see accounts.md §6.1, remote-sync.md
        §2.6 and §5).
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      - description: Destination id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.DestinationView'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: 'Subscriber route: missing mirror ability, regular role, or
            repo out of scope'
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo, destination, or credential (deleted) not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Credential referenced by destination no longer exists in the
            vault
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger a manual mirror-sync push on one destination
      tags:
      - repos
  /admin/repos/{name}/formidable:
    post:
      description: |-
        Stamps .formidable/context.json on top of HEAD so the
        repo picks up structured record-merge behaviour on subsequent
        writes. Gated to server.formidable_first=true so generic-mode
        operators don't trip this accidentally. Idempotent: a repo
        that already carries a valid marker returns stamped=false
        and writes no commit. On a successful stamp the server
        appends one `repo_convert_formidable` audit entry.
      parameters:
      - description: Repo name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ConvertFormidableResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: Server not in formidable_first mode
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Repo not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: Empty repo — nothing to stamp on top of
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Convert a plain repo to a Formidable context (admin only)
      tags:
      - admin
