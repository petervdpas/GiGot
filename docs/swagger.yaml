basePath: /api
definitions:
  git.BranchInfo:
    properties:
      active:
        type: boolean
      head:
        type: string
      name:
        type: string
    type: object
  git.LogEntry:
    properties:
      author:
        type: string
      date:
        type: string
      hash:
        type: string
      message:
        type: string
    type: object
  server.ErrorResponse:
    properties:
      error:
        example: repository not found
        type: string
    type: object
  server.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  server.MessageResponse:
    properties:
      message:
        example: repository created
        type: string
    type: object
  server.RepoInfo:
    properties:
      name:
        example: my-templates
        type: string
      path:
        example: repos/my-templates.git
        type: string
    type: object
  server.RepoListResponse:
    properties:
      count:
        example: 2
        type: integer
      repos:
        items:
          $ref: '#/definitions/server.RepoInfo'
        type: array
    type: object
  server.RepoLogResponse:
    properties:
      count:
        example: 5
        type: integer
      entries:
        items:
          $ref: '#/definitions/git.LogEntry'
        type: array
      name:
        example: my-templates
        type: string
    type: object
  server.RepoStatusResponse:
    properties:
      branches:
        items:
          $ref: '#/definitions/git.BranchInfo'
        type: array
      empty:
        example: false
        type: boolean
      name:
        example: my-templates
        type: string
    type: object
  server.RevokeTokenRequest:
    properties:
      token:
        example: a1b2c3d4...
        type: string
    type: object
  server.TokenRequest:
    properties:
      roles:
        example:
        - admin
        - reader
        items:
          type: string
        type: array
      username:
        example: alice
        type: string
    type: object
  server.TokenResponse:
    properties:
      roles:
        example:
        - admin
        - reader
        items:
          type: string
        type: array
      token:
        example: a1b2c3d4...
        type: string
      username:
        example: alice
        type: string
    type: object
host: localhost:3417
info:
  contact:
    name: Peter van de Pas
  description: Git-backed sync server for Formidable — local-first, server-optional.
  license:
    name: MIT
  title: GiGot API
  version: 0.1.0
paths:
  /auth/token:
    delete:
      consumes:
      - application/json
      description: POST issues a new token, DELETE revokes one
      parameters:
      - description: Token request (for POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.TokenRequest'
      - description: Revoke request (for DELETE)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.RevokeTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.MessageResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Issue or revoke API tokens
      tags:
      - auth
    post:
      consumes:
      - application/json
      description: POST issues a new token, DELETE revokes one
      parameters:
      - description: Token request (for POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.TokenRequest'
      - description: Revoke request (for DELETE)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.RevokeTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.MessageResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Issue or revoke API tokens
      tags:
      - auth
  /git/{name}.git/git-receive-pack:
    post:
      consumes:
      - application/octet-stream
      description: Git smart HTTP protocol — receives packfile data for push operations
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Git push
      tags:
      - git
  /git/{name}.git/git-upload-pack:
    post:
      consumes:
      - application/octet-stream
      description: Git smart HTTP protocol — serves packfile data for clone and fetch
        operations
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Git clone/fetch
      tags:
      - git
  /git/{name}.git/info/refs:
    get:
      description: Git smart HTTP protocol — advertise refs for clone/fetch/push
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - description: git-upload-pack or git-receive-pack
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Git refs discovery
      tags:
      - git
  /health:
    get:
      description: Returns server health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.HealthResponse'
      summary: Health check
      tags:
      - system
  /repos:
    get:
      consumes:
      - application/json
      description: GET lists all repositories, POST creates a new one
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoListResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List or create repositories
      tags:
      - repos
    post:
      consumes:
      - application/json
      description: GET lists all repositories, POST creates a new one
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoListResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List or create repositories
      tags:
      - repos
  /repos/{name}:
    delete:
      description: GET returns repository details, DELETE removes it
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoInfo'
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get or delete a repository
      tags:
      - repos
    get:
      description: GET returns repository details, DELETE removes it
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoInfo'
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get or delete a repository
      tags:
      - repos
  /repos/{name}/branches:
    get:
      description: Returns all branches in a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/git.BranchInfo'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List branches
      tags:
      - sync
  /repos/{name}/log:
    get:
      description: Returns recent commits from a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      - default: 20
        description: Max number of commits
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoLogResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Commit log
      tags:
      - sync
  /repos/{name}/status:
    get:
      description: Returns branches and status of a repository
      parameters:
      - description: Repository name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.RepoStatusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Repository status
      tags:
      - sync
securityDefinitions:
  BearerAuth:
    description: 'Enter your bearer token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
