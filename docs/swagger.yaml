        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage one credential by name (admin only)
      tags:
      - admin
  /admin/login:
    post:
      consumes:
      - application/json
      description: Exchanges username/password for a session cookie.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.AdminLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Admin login
      tags:
      - admin
  /admin/logout:
    post:
      responses:
        "204":
          description: No Content
      summary: Admin logout
      tags:
      - admin
  /admin/session:
    get:
      description: |-
        Returns the admin identity associated with the session cookie,
        or 401 if no valid session exists. The admin UI polls this on
        load to decide whether to show the login form.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.AdminLoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Current admin session
      tags:
      - admin
  /admin/tokens:
    delete:
      consumes:
      - application/json
      description: |-
        GET lists, POST issues, DELETE revokes. Requires a valid
        admin session cookie (obtained via /admin/login).
      parameters:
      - description: Issue body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.TokenRequest'
      - description: Update-repos body (PATCH)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.UpdateTokenReposRequest'
      - description: Revoke body (DELETE)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.RevokeTokenRequest'
      produces:
