basePath: /api
definitions:
  formidable.FieldConflict:
    properties:
      key:
        type: string
      reason:
        type: string
      scope:
        type: string
    type: object
  formidable.RecordConflict:
    properties:
      current_version:
        type: string
      field_conflicts:
        items:
          $ref: '#/definitions/formidable.FieldConflict'
        type: array
      path:
        type: string
    type: object
  git.BranchInfo:
    properties:
      active:
        type: boolean
      head:
        type: string
      name:
        type: string
    type: object
  git.ChangeEntry:
    properties:
      blob:
        type: string
      op:
        type: string
      path:
        type: string
    type: object
  git.ChangesInfo:
    properties:
      changes:
        items:
          $ref: '#/definitions/git.ChangeEntry'
        type: array
      from:
        type: string
      to:
        type: string
    type: object
  git.CommitResult:
    properties:
      merged_from:
        type: string
      merged_with:
        type: string
      version:
        type: string
    type: object
  git.FileInfo:
    properties:
      content_b64:
        type: string
      path:
        type: string
      version:
        type: string
    type: object
  git.HeadInfo:
    properties:
      default_branch:
        type: string
      version:
        type: string
    type: object
  git.LogEntry:
    properties:
      author:
        type: string
      date:
        type: string
      hash:
        type: string
      message:
        type: string
    type: object
  git.SnapshotFile:
    properties:
      content_b64:
        type: string
      path:
        type: string
    type: object
  git.SnapshotInfo:
    properties:
      files:
        items:
          $ref: '#/definitions/git.SnapshotFile'
        type: array
      version:
        type: string
    type: object
  git.TreeEntry:
    properties:
      blob:
        type: string
      path:
        type: string
      size:
        type: integer
    type: object
  git.TreeInfo:
    properties:
      files:
        items:
          $ref: '#/definitions/git.TreeEntry'
        type: array
      version:
        type: string
    type: object
  git.WriteResult:
    properties:
      merged_from:
        type: string
      merged_with:
        type: string
      version:
        type: string
    type: object
  server.AdminLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  server.AdminLoginResponse:
    properties:
      username:
        type: string
    type: object
  server.AuthorInfo:
    properties:
      email:
        example: alice@example.com
        type: string
      name:
        example: Alice
        type: string
    type: object
  server.ChangeRequest:
    properties:
      content_b64:
        example: aGVsbG8K
        type: string
      op:
        example: put
        type: string
      path:
        example: templates/basic.yaml
        type: string
    type: object
  server.CommitConflictResponse:
    properties:
      conflicts:
        items:
          $ref: '#/definitions/server.WriteFileConflictResponse'
        type: array
      current_version:
        example: def456...
        type: string
    type: object
  server.CommitRecordConflictResponse:
    properties:
      current_version:
        example: def456...
        type: string
      record_conflicts:
        items:
          $ref: '#/definitions/formidable.RecordConflict'
        type: array
    type: object
  server.CommitRequest:
    properties:
      author:
        $ref: '#/definitions/server.AuthorInfo'
      changes:
        items:
          $ref: '#/definitions/server.ChangeRequest'
        type: array
      message:
        example: Rename a→c
        type: string
      parent_version:
        example: abc123...
        type: string
    type: object
  server.CreateCredentialRequest:
    properties:
      expires:
        type: string
      kind:
        type: string
      name:
        type: string
      notes:
        type: string
      secret:
        type: string
    type: object
  server.CreateRepoRequest:
    properties:
      name:
        example: my-templates
        type: string
      scaffold_formidable:
        example: false
        type: boolean
      source_url:
        example: https://github.com/owner/repo.git
        type: string
    type: object
  server.CredentialListResponse:
    properties:
      count:
        type: integer
      credentials:
        items:
          $ref: '#/definitions/server.CredentialView'
        type: array
    type: object
  server.CredentialView:
    properties:
      created_at:
        type: string
      expires:
        type: string
      kind:
        type: string
      last_used:
        type: string
      name:
        type: string
      notes:
        type: string
    type: object
  server.EnrollRequest:
    properties:
      client_id:
        example: laptop-01
        type: string
      public_key:
        example: base64-encoded-32-byte-key
        type: string
    type: object
  server.EnrollResponse:
    properties:
      client_id:
        type: string
      server_public_key:
        type: string
    type: object
  server.ErrorResponse:
    properties:
      error:
        example: repository not found
        type: string
    type: object
  server.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  server.MessageResponse:
    properties:
      message:
        example: repository created
        type: string
    type: object
  server.RecordQueryResponse:
    properties:
      records:
        items:
          additionalProperties: {}
          type: object
        type: array
      version:
        type: string
    type: object
  server.RepoInfo:
    properties:
      name:
        example: my-templates
        type: string
      path:
        example: repos/my-templates.git
        type: string
    type: object
  server.RepoListResponse:
    properties:
      count:
        example: 2
        type: integer
      repos:
        items:
          $ref: '#/definitions/server.RepoInfo'
        type: array
    type: object
  server.RepoLogResponse:
    properties:
      count:
        example: 5
        type: integer
      entries:
        items:
          $ref: '#/definitions/git.LogEntry'
        type: array
      name:
        example: my-templates
        type: string
    type: object
  server.RepoStatusResponse:
    properties:
      branches:
        items:
          $ref: '#/definitions/git.BranchInfo'
        type: array
      empty:
        example: false
        type: boolean
      name:
        example: my-templates
        type: string
    type: object
  server.RevokeTokenRequest:
    properties:
      token:
        example: a1b2c3d4...
        type: string
    type: object
  server.ServerPubKeyResponse:
    properties:
      public_key:
        example: base64-encoded-32-byte-key
        type: string
    type: object
  server.TokenListItem:
    properties:
      repos:
        items:
          type: string
        type: array
      token:
        type: string
      username:
        type: string
    type: object
  server.TokenListResponse:
    properties:
      count:
        type: integer
      tokens:
        items:
          $ref: '#/definitions/server.TokenListItem'
        type: array
    type: object
  server.TokenRequest:
    properties:
      repos:
        example:
        - my-templates
        - shared-context
        items:
          type: string
        type: array
      username:
        example: alice
        type: string
    type: object
  server.TokenResponse:
    properties:
      repos:
        items:
          type: string
        type: array
      token:
        example: a1b2c3d4...
        type: string
      username:
        example: alice
        type: string
    type: object
  server.UpdateCredentialRequest:
    properties:
      expires:
        type: string
      kind:
        type: string
      notes:
        type: string
      secret:
        type: string
    type: object
  server.UpdateTokenReposRequest:
    properties:
      repos:
        items:
          type: string
        type: array
      token:
        type: string
    type: object
  server.WriteFileConflictResponse:
    properties:
      base_b64:
        type: string
      current_version:
        example: def456...
        type: string
      path:
        example: templates/basic.yaml
        type: string
      theirs_b64:
        type: string
      yours_b64:
        type: string
    type: object
  server.WriteFileRequest:
    properties:
      author:
        $ref: '#/definitions/server.AuthorInfo'
      content_b64:
        example: aGVsbG8K
        type: string
      message:
        example: Update basic template
        type: string
      parent_version:
        example: abc123...
        type: string
    type: object
host: localhost:3417
info:
  contact:
    name: Peter van de Pas
  description: Git-backed sync server for Formidable — local-first, server-optional.
  license:
    name: MIT
  title: GiGot API
  version: 0.1.0
paths:
  /admin/credentials:
    get:
      consumes:
      - application/json
      description: |-
        GET lists credential metadata; POST creates a new credential.
        The secret is write-only — it is never returned on any
        response. Session-cookie authenticated.
      parameters:
      - description: Create body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.CreateCredentialRequest'
      produces:
      - application/json
      responses:
        "200":
          description: GET response
          schema:
            $ref: '#/definitions/server.CredentialListResponse'
        "201":
          description: POST response
          schema:
            $ref: '#/definitions/server.CredentialView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Name already exists
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage the credential vault (admin only)
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: |-
        GET lists credential metadata; POST creates a new credential.
        The secret is write-only — it is never returned on any
        response. Session-cookie authenticated.
      parameters:
      - description: Create body (POST)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.CreateCredentialRequest'
      produces:
      - application/json
      responses:
        "200":
          description: GET response
          schema:
            $ref: '#/definitions/server.CredentialListResponse'
        "201":
          description: POST response
          schema:
            $ref: '#/definitions/server.CredentialView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: Name already exists
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage the credential vault (admin only)
      tags:
      - admin
  /admin/credentials/{name}:
    delete:
      consumes:
      - application/json
      description: |-
        GET returns metadata; PATCH updates any of kind/secret/
        expires/notes (omitted fields are left unchanged); DELETE
        removes the credential. Session-cookie authenticated.
      parameters:
      - description: Credential name
        in: path
        name: name
        required: true
        type: string
      - description: Patch body (PATCH)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.UpdateCredentialRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.CredentialView'
        "204":
          description: DELETE response
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Manage one credential by name (admin only)
      tags:
      - admin
    get:
      consumes:
      - application/json
      description: |-
        GET returns metadata; PATCH updates any of kind/secret/
        expires/notes (omitted fields are left unchanged); DELETE
