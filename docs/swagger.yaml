  /admin/auth:
    get:
      consumes:
      - application/json
      description: |-
        GET returns the current allow_local + OAuth + gateway
        config snapshot. PATCH applies a new snapshot: the
        OAuth registry and gateway strategy are rebuilt,
        atomically swapped into place on success, and the
        change is persisted to the config file. Rejects with
        400 when a secret ref fails to resolve or a provider
        discovery URL is unreachable — old state stays live.
      parameters:
      - description: New auth config (PATCH)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.AuthReloadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Current state (GET + PATCH)
          schema:
            $ref: '#/definitions/server.AuthRuntimeView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      summary: Read or reload auth runtime state (admin only)
      tags:
      - admin
    patch:
      consumes:
      - application/json
      description: |-
        GET returns the current allow_local + OAuth + gateway
        config snapshot. PATCH applies a new snapshot: the
        OAuth registry and gateway strategy are rebuilt,
        atomically swapped into place on success, and the
        change is persisted to the config file. Rejects with
        400 when a secret ref fails to resolve or a provider
        discovery URL is unreachable — old state stays live.
      parameters:
      - description: New auth config (PATCH)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.AuthReloadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Current state (GET + PATCH)
          schema:
            $ref: '#/definitions/server.AuthRuntimeView'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
