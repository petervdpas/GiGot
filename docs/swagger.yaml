  /admin/limits:
    get:
      consumes:
      - application/json
      description: |-
        GET returns the current LimitsConfig plus live
        in-flight slot count. PATCH updates push_slots
        and/or push_retry_after_sec; both fields are
        optional, omitted fields are left unchanged.
        Successful PATCH persists the new values to the
        config file (cfg.Save) so changes survive restart,
        and resizes the live slot pool — in-flight pushes
        finish on the old capacity, new pushes are gated
        by the new one. Bounds: push_slots 1-1000,
        push_retry_after_sec 1-3600.
      parameters:
      - description: Patch body (PATCH only)
        in: body
        name: body
        schema:
          $ref: '#/definitions/server.LimitsRequest'
