  /admin/benchmark:
    post:
      consumes:
      - application/json
      description: |-
        Spins up a fresh sandbox `*Server` against a temp
        directory, seeds it with N synthetic accounts + subs +
        tags, runs the requested topics for the requested
        iteration count, tears down the sandbox, and returns
        per-topic timing summaries (median / p95 / p99 / total).

        Always runs against synthetic data — the point is to
        characterise the host hardware, not the live dataset.
        Mode "sequential" runs each topic in turn; "concurrent"
        runs all selected topics in parallel goroutines so the
        timings include cross-topic contention.
