{{define "title"}}Admin - Accounts{{end}}
{{define "styles"}}
<link rel="stylesheet" href="/assets/tags.css">
<link rel="stylesheet" href="/assets/drawer.css">
{{end}}
{{define "scripts"}}
<script src="/assets/lazy.js"></script>
<script src="/assets/drawer.js"></script>
<script src="/assets/tag_picker.js"></script>
<script src="/assets/tag_filter.js"></script>
<script src="/assets/accounts.js"></script>
{{end}}
{{define "content"}}
<div class="page-header with-add">
  <h1>Accounts <span class="muted">(<span id="acct-count">0</span>)</span></h1>
  <button class="btn-add" data-drawer-open="create-account" aria-label="Create account" title="Create account">+</button>
</div>
<div class="card" id="tag-filter-card">
  <h2>Filter by tag</h2>
  <div id="tag-filter" class="tag-filter">
    <div class="muted tag-filter-empty">No tags in use on any account yet.</div>
  </div>
</div>
<div class="card">
  <h2>Existing accounts</h2>
  <table class="responsive-table">
    <thead><tr><th>Provider</th><th>Identifier</th><th>Display name</th><th>Role</th><th></th></tr></thead>
    <tbody id="acct-rows"></tbody>
  </table>
</div>
{{end}}
