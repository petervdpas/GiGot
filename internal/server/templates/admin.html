<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GiGot{{if .Version}} {{.Version}}{{end}} Admin - Sign in</title>
<meta name="gigot-version" content="{{.Version}}">
<link rel="stylesheet" href="/assets/admin.css">
<script>
  /* Apply stored theme before the body paints to avoid a flash on page
     load. Mirrors the blocks on the other admin pages. */
  try {
    var t = localStorage.getItem('gigot.theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private-mode / disabled storage → stay on default dark */ }
</script>
</head>
<body>

<div class="theme-fab">
  <span>Light theme</span>
  <span id="theme-toggle-host"></span>
</div>

<div class="login-wrap card">
  <img class="logo" src="/assets/gigot.png" alt="GiGot">
  <div class="brand-name">GiGot{{if .Version}} <span class="brand-version muted">{{.Version}}</span>{{end}}</div>
  <div class="brand-tag">Git-backed server for Formidable</div>
  <h2>Sign in</h2>
  <form id="login-form">
    <input name="username" placeholder="Username" autofocus required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Sign in</button>
    <div id="login-error" class="error"></div>
  </form>
  <div id="oauth-providers" class="oauth-providers hidden"></div>
  <p class="muted login-footer">
    No account yet? <a href="/admin/register">Register</a>.
  </p>
</div>

<script src="/assets/ui.js"></script>
<script src="/assets/dialogs.js"></script>
<script src="/assets/admin_common.js"></script>
<script>
  /* Render the corner theme toggle. Same pattern the landing page
     uses — a small one-pager boot inside the template keeps login.js
     focused on authentication. */
  (function () {
    var host = document.getElementById('theme-toggle-host');
    if (host) {
      host.innerHTML = GG.toggle_switch.html({ id: 'theme-toggle', ariaLabel: 'Toggle light theme' });
      GG.theme.initToggle('theme-toggle');
    }
  })();
</script>
<script src="/assets/login.js"></script>
</body>
</html>
