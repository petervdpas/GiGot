<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GiGot{{if .Version}} {{.Version}}{{end}} Admin - Tags</title>
<meta name="gigot-version" content="{{.Version}}">
<link rel="stylesheet" href="/assets/admin.css">
<link rel="stylesheet" href="/assets/tags.css">
<link rel="stylesheet" href="/assets/drawer.css">
<script>
  /* Apply stored theme before the body paints to avoid a flash on page
     load. Identical block on every admin page. */
  try {
    var t = localStorage.getItem('gigot.theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private-mode / disabled storage → stay on default dark */ }
</script>
</head>
<body>

<div id="app">
  <div class="shell">
    <aside id="admin-sidebar"></aside>
    <main class="main">
      <div class="panel active">
        <div class="page-header with-add">
          <h1>Tags <span class="muted">(<span id="tag-count">0</span>)</span></h1>
          <button class="btn-add" data-drawer-open="create-tag" aria-label="Add tag" title="Add tag">+</button>
        </div>
        <div class="card">
          <div class="tag-card-head">
            <h2>Existing tags</h2>
            <button type="button" id="btn-sweep-unused" class="small">Remove unused</button>
          </div>
          <table class="responsive-table">
            <thead><tr><th>Name</th><th>Repos</th><th>Subs</th><th>Accounts</th><th>Created</th><th>By</th><th></th></tr></thead>
            <tbody id="tag-rows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<aside class="drawer" data-drawer-name="create-tag">
  <div class="drawer-head">
    <h2>Add tag</h2>
    <button type="button" class="drawer-close" aria-label="Close">×</button>
  </div>
  <div class="drawer-body" data-lazy-tpl="create-tag" data-lazy-trigger="manual"></div>
</aside>

<script src="/assets/ui.js"></script>
<script src="/assets/dialogs.js"></script>
<script src="/assets/admin_common.js"></script>
<script src="/assets/lazy.js"></script>
<script src="/assets/drawer.js"></script>
<script src="/assets/tags.js"></script>
</body>
</html>
