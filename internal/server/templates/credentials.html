<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GiGot{{if .Version}} {{.Version}}{{end}} Admin - Credentials</title>
<meta name="gigot-version" content="{{.Version}}">
<link rel="stylesheet" href="/assets/admin.css">
<link rel="stylesheet" href="/assets/drawer.css">
<script>
  /* Apply stored theme before the body paints to avoid a flash on page
     load. Identical block on every admin page. */
  try {
    var t = localStorage.getItem('gigot.theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private-mode / disabled storage → stay on default dark */ }
</script>
</head>
<body>

<div id="app">
  <div class="shell">
    <aside id="admin-sidebar"></aside>
    <main class="main">
      <div class="panel active">
        <div class="page-header with-add">
          <h1>Credentials <span class="muted">(<span id="cred-count">0</span>)</span></h1>
          <button class="btn-add" data-drawer-open="create-credential" aria-label="Add credential" title="Add credential">+</button>
        </div>
        <div class="card" id="cred-filter-card">
          <h2>Search</h2>
          <div id="cred-filter"></div>
        </div>
        <div class="card">
          <h2>Existing credentials</h2>
          <table class="responsive-table">
            <thead><tr><th>Name</th><th>Kind</th><th>Expires</th><th>Notes</th><th>Last used</th><th></th></tr></thead>
            <tbody id="cred-rows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/assets/ui.js"></script>
<script src="/assets/dialogs.js"></script>
<script src="/assets/admin_common.js"></script>
<script src="/assets/lazy.js"></script>
<script src="/assets/drawer.js"></script>
<script src="/assets/text_filter.js"></script>
<script src="/assets/credentials.js"></script>
</body>
</html>
