<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GiGot{{if .Version}} {{.Version}}{{end}} Admin - Credentials</title>
<meta name="gigot-version" content="{{.Version}}">
<link rel="stylesheet" href="/assets/admin.css">
<script>
  /* Apply stored theme before the body paints to avoid a flash on page
     load. Identical block on every admin page. */
  try {
    var t = localStorage.getItem('gigot.theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private-mode / disabled storage → stay on default dark */ }
</script>
</head>
<body>

<div id="app">
  <div class="shell">
    <aside id="admin-sidebar"></aside>
    <main class="main">
      <div class="panel active">
        <div class="page-header">
          <h1>Credentials <span class="muted">(<span id="cred-count">0</span>)</span></h1>
        </div>
        <div class="card">
          <h2>Add credential</h2>
          <form id="cred-form" class="row">
            <input name="name" placeholder="Name (e.g. github-personal)" required>
            <span id="kind-host"></span>
            <input name="secret" type="password" placeholder="Secret" required>
            <input name="expires" type="text" data-gdp placeholder="Expires (YYYY-MM-DD)" title="Expires (optional)">
            <input name="notes" placeholder="Notes (optional)">
            <button type="submit">Add</button>
          </form>
          <div class="muted create-repo-hint">
            The secret is stored sealed on the server and never shown again. To change it later, delete and re-add.
            Multiple credentials of the same kind are fine — name each one distinctly (github-personal, github-work).
          </div>
          <div id="cred-msg" class="muted"></div>
        </div>
        <div class="card">
          <h2>Existing credentials</h2>
          <table class="responsive-table">
            <thead><tr><th>Name</th><th>Kind</th><th>Expires</th><th>Notes</th><th>Last used</th><th></th></tr></thead>
            <tbody id="cred-rows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/assets/ui.js"></script>
<script src="/assets/dialogs.js"></script>
<script src="/assets/admin_common.js"></script>
<script src="/assets/credentials.js"></script>
</body>
</html>
