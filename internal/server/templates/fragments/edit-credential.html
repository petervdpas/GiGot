<div class="admin-forms-info">
  Editing <code class="code-chip">{{name}}</code>.
  Notes and expiry are pure metadata, safe to change. To rotate the
  secret or rename the credential, delete and re-add: rename would
  orphan any destination that references the credential by name.
</div>
<form id="edit-cred-form" class="drawer-form">
  <label>
    <span class="field-label">Expires</span>
    <input name="expires" type="text" data-gdp value="{{expires_date}}" placeholder="YYYY-MM-DD (optional)">
  </label>
  <label class="drawer-form-row-tall">
    <span class="field-label">Notes</span>
    <textarea name="notes" rows="3" placeholder="optional. what is this credential for, who owns it…">{{notes}}</textarea>
  </label>
  <div id="edit-cred-msg" class="muted"></div>
  <div class="drawer-form-actions">
    <button type="submit">Save</button>
  </div>
</form>
