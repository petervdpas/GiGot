<div class="drawer-form-info">
  The secret is stored sealed on the server and never shown again.
  To change it later, delete and re-add. Multiple credentials of
  the same kind are fine. Name each one distinctly
  (<code class="code-chip">github-personal</code>,
  <code class="code-chip">github-work</code>).
</div>
<form id="cred-form" class="drawer-form">
  <label>
    <span class="field-label">Name</span>
    <input name="name" placeholder="e.g. github-personal" required>
  </label>
  <label>
    <span class="field-label">Kind</span>
    <span id="kind-host"></span>
  </label>
  <label>
    <span class="field-label">Secret</span>
    <input name="secret" type="password" placeholder="bearer token, password, key…" required autocomplete="new-password">
  </label>
  <label>
    <span class="field-label">Expires</span>
    <input name="expires" type="text" data-gdp placeholder="YYYY-MM-DD (optional)">
  </label>
  <label class="drawer-form-row-tall">
    <span class="field-label">Notes</span>
    <textarea name="notes" rows="3" placeholder="optional. what is this credential for, who owns it…"></textarea>
  </label>
  <div id="cred-msg" class="muted"></div>
  <div class="drawer-form-actions">
    <button type="submit">Add</button>
  </div>
</form>
