<div class="ability-picker">
  {{#each abilities}}
    <div class="switch-row {{stale}}">
      <label class="switch">
        <input type="checkbox" name="abilities" value="{{name}}" {{checked}}>
        <span class="slider"></span>
      </label>
      <span class="control-label">{{name}}</span>
      <span class="muted ability-hint">{{hint}}</span>
    </div>
  {{/each}}
  <div class="abilities-foot">
    <span class="muted ability-status" data-lazy-msg></span>
    <button type="button" class="small ability-save hidden" data-lazy-action="submit">Save</button>
  </div>
</div>
