<div class="sub-chips {{chips_hidden}}">
  {{#each subs}}
    <span class="sub-chip" title="{{title}}">{{label}}</span>
  {{/each}}
</div>
<div class="muted ic-section-empty {{empty_hidden}}">No subscription keys grant access to this repo.</div>
<div class="subs-actions">
  <button type="button" class="small secondary issue-key-btn">+ Issue key</button>
</div>
