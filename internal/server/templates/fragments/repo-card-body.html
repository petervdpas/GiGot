<div class="ic-stats">
  <span><span class="stat-label">{{commit_label}}</span><span class="stat-value">{{commits}}</span></span>
  <span class="{{head_hidden}}"><span class="stat-label">HEAD</span><span class="stat-value">{{head}}</span></span>
  <span class="{{branch_hidden}}"><span class="stat-label">Branch</span><span class="stat-value">{{branch}}</span></span>
</div>
<div class="ic-section ic-tags-section">
  <div class="ic-section-label muted">Tags</div>
  <div class="ic-tags-host"></div>
</div>
<div class="ic-section" data-section="subs"></div>
<div class="ic-section" data-section="dest"></div>
<div class="ic-actions">
  <button type="button" class="small secondary convert-formidable-btn {{convert_hidden}}">Convert to Formidable</button>
  <button type="button" class="small danger delete-btn">Delete</button>
</div>
