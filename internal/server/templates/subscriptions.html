<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GiGot Admin — Subscription keys</title>
<link rel="stylesheet" href="/assets/admin.css">
<script>
  /* Apply stored theme before the body paints to avoid a flash on page
     load. Identical block on every admin page. */
  try {
    var t = localStorage.getItem('gigot.theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) { /* private-mode / disabled storage → stay on default dark */ }
</script>
</head>
<body>

<div id="app">
  <div class="shell">
    <aside id="admin-sidebar"></aside>
    <main class="main">
      <div class="panel active">
        <div class="page-header">
          <h1>Subscription keys <span class="muted">(<span id="count">0</span>)</span></h1>
        </div>
        <div class="card">
          <h2>Issue subscription key</h2>
          <form id="issue-form" class="row issue-form-row">
            <div>
              <div class="muted issue-repos-label">Account this key is issued to:</div>
              <span id="issue-account-host"></span>
            </div>
            <div>
              <div class="muted issue-repos-label">Repo this key binds to:</div>
              <span id="issue-repo-host"></span>
            </div>
            <div id="issue-abilities-wrap" class="hidden">
              <div class="muted issue-repos-label">Abilities:</div>
              <div id="issue-abilities" class="ability-picker"></div>
            </div>
            <button type="submit">Issue key</button>
          </form>
          <div id="issue-msg" class="success"></div>
        </div>
        <div class="card">
          <h2>Active keys</h2>
          <div id="token-grid" class="card-grid"></div>
          <div id="token-empty" class="muted hidden">No active keys — issue one above.</div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/assets/ui.js"></script>
<script src="/assets/dialogs.js"></script>
<script src="/assets/admin_common.js"></script>
<script src="/assets/subscriptions.js"></script>
</body>
</html>
